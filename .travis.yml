language: node_js
node_js: v14
addons:
  chrome: stable

before_script:
  # Download and unzip the zola executable
  # Replace the version numbers in the URL by the version you want to use
  - curl -s -L https://github.com/getzola/zola/releases/download/v0.14.1/zola-v0.14.1-x86_64-unknown-linux-gnu.tar.gz | sudo tar xvzf - -C /usr/local/bin
  - npm install -g @lhci/cli@0.7.x

script:
  - zola build
  - lhci autorun --upload.githubToken=${GH_TOKEN}

# If you are using a different folder than `public` for the output directory, you will
# need to change the `zola` command and the `ghp-import` path
after_success: |
  [ $TRAVIS_BRANCH = master ] &&
  [ $TRAVIS_PULL_REQUEST = false ] &&
  zola build &&
  rm -rf .git &&
  git clone --depth 1 https://github.com/gabelluardo/gabelluardo.github.io.git out &&
  cd out && mv ../public . &&
  sudo pip install ghp-import &&
  ghp-import -n public -b master -m "Update" &&
  git push -fq https://${GH_TOKEN}@github.com/gabelluardo/gabelluardo.github.io.git master
